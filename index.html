<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>戶部尚書 V15.7 - 名目官制版</title>
    <link rel="apple-touch-icon" href="image.png">
    <link rel="icon" href="image.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #f0f2f5; --out: #ff4757; --in: #2ed573; --gold: #ffa502; --silver: #576574; --salary: #a55eea; --blue: #4b7bec; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; min-height: 90vh; position: relative; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .quote-box { font-style: italic; color: #e67e22; font-size: 0.85rem; margin-bottom: 15px; min-height: 3.5rem; display: flex; align-items: center; justify-content: center; background: #fff5e6; border-radius: 15px; padding: 8px; border: 1px dashed #ffd39b; }
        select { border: 1px solid #ddd; padding: 8px; border-radius: 12px; background: #f8f9fa; outline: none; }
        .page { display: none; }
        .page.active { display: block; }
        .balance-box { background: linear-gradient(145deg, #ffffff, #f0f0f0); padding: 15px; border-radius: 20px; margin-bottom: 15px; box-shadow: 5px 5px 15px #d1d1d1; }
        .balance-amount { font-size: 2.2rem; font-weight: bold; color: var(--silver); margin: 5px 0; }
        .main-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .stat-card { background: white; padding: 8px; border-radius: 12px; border: 1px solid #f0f0f0; }
        .stat-label { font-size: 0.7rem; color: #888; }
        .stat-val { font-weight: bold; font-size: 0.95rem; display: block; }
        .btn-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn { border: none; padding: 15px; border-radius: 15px; font-weight: bold; color: white; cursor: pointer; font-size: 1rem; -webkit-tap-highlight-color: transparent; }
        .btn-salary { background: var(--salary); grid-column: span 2; }
        .btn-out { background: var(--out); }
        .btn-in { background: var(--in); }
        .btn-nav { background: var(--blue); }
        .btn-gold { background: var(--gold); }
        .detail-list { text-align: left; margin: 5px 0; max-height: 200px; overflow-y: auto; padding: 5px; background: #fafafa; border-radius: 15px; }
        .detail-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; font-size: 0.95rem; cursor: pointer; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; align-items: center; justify-content: center; z-index: 10000; }
        /* 設定彈窗內的樣式 */
        .swal-list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">⌛ 正在對帳中...</div>

<div class="card">
    <div class="top-nav">
        <div>
            <select id="sel-year" onchange="updateUI()"></select>
            <select id="sel-month" onchange="updateUI()"></select>
        </div>
        <div onclick="openSettingsMenu()" style="cursor:pointer; font-size:1.3rem; padding: 5px;">⚙️</div>
    </div>

    <div id="page-home" class="page active">
        <div class="quote-box" id="quote-display">微臣叩見尚書大人。</div>
        <div class="balance-box">
            <div class="stat-label">國庫白銀總量</div>
            <div class="balance-amount" id="balance-display">$ 0</div>
            <div class="main-stats" id="stats-grid"></div>
        </div>
        <input type="number" id="amount" placeholder="輸入數額..." inputmode="numeric" style="width:100%; padding:15px; border-radius:15px; border:2px solid #eee; box-sizing:border-box; margin-bottom:10px; font-size:1.5rem; text-align:center; outline:none;">
        <div class="btn-container">
            <button class="btn btn-salary" onclick="doAction('salary')">🧧 領取俸祿</button>
            <button class="btn btn-out" onclick="doAction('out')">💸 肆意噴錢</button>
            <button class="btn btn-in" onclick="doAction('in')">📜 強制充公</button>
            <button class="btn btn-nav" onclick="switchPage('page-stats')">📊 揮霍分析</button>
            <button class="btn btn-gold" onclick="switchPage('page-plan')">📅 充公計畫</button>
        </div>
    </div>

    <div id="page-stats" class="page">
        <h3>📊 帳務審核中心</h3>
        <canvas id="outPieChart" style="max-height: 180px;"></canvas>
        <h4 style="text-align:left; margin:10px 0 5px; font-size:0.9rem;">💸 支出明細 (點擊修正)</h4>
        <div class="detail-list" id="expense-list"></div>
        <h4 style="text-align:left; margin:10px 0 5px; font-size:0.9rem;">📜 充公紀錄 (點擊刪除)</h4>
        <div class="detail-list" id="saved-list"></div>
        <button class="btn" style="background:#bbb; width:100%; margin-top:15px;" onclick="switchPage('page-home')">返回主頁</button>
    </div>

    <div id="page-plan" class="page">
        <h3>📅 年度充公計畫</h3>
        <div id="month-grid" style="display:grid; gap:10px; max-height:400px; overflow-y:auto;"></div>
        <button class="btn" style="background:#bbb; width:100%; margin-top:15px;" onclick="switchPage('page-home')">返回主頁</button>
    </div>
</div>

<script>
    const roasts = ["尚書大人，這筆白銀充公後，國庫終於不是空的了。","充公得好！反正在你手上也會被噴掉。","這點錢也叫充公？你是看不起本尚書嗎？","領俸祿了！尚書大人，別剛領完就去揮霍啊。","看到俸祿入庫，微臣終於不用擔心尚書大人餓死了。","今日噴錢如流水，今日充公如擠奶，尚書大人自重啊！","白銀入庫，國泰民安；肆意噴錢，提頭來見！","警告：國庫水位過低，請立即強制充公！","充公成功！雖然不多，但勉強算你有一點點良心。"];
    
    let WEB_APP_URL = localStorage.getItem('user_gas_url') || "";
    let db = { total: 0, monthlyGoal: 5000, years: {}, categories: ["伙食", "交通", "娛樂", "購物", "其他"] };
    let outPieChart = null;

    const sy = document.getElementById('sel-year');
    const sm = document.getElementById('sel-month');
    for(let y=2024; y<=2030; y++) sy.add(new Option(y+"年", y));
    for(let m=1; m<=12; m++) sm.add(new Option(m+"月", m));
    sy.value = new Date().getFullYear();
    sm.value = new Date().getMonth() + 1;

    function getM() {
        const y = sy.value, m = sm.value;
        if(!db.years) db.years = {};
        if(!db.years[y]) db.years[y] = { months: {} };
        if(!db.years[y].months[m]) db.years[y].months[m] = { salary:0, out:0, saved:0, outDetails:{}, savedDetails:[] };
        const data = db.years[y].months[m];
        if(!data.outDetails) data.outDetails = {};
        if(!data.savedDetails) data.savedDetails = [];
        return data;
    }

    async function doAction(type) {
        const amtInput = document.getElementById('amount');
        const amt = parseInt(amtInput.value);
        if(!amt || amt <= 0) return Swal.fire("數額呢？", "請輸入大於0的數值", "warning");
        const mData = getM();

        if(type === 'salary') {
            db.total += amt;
            mData.salary += amt;
        } else if(type === 'in') {
            if(db.total < amt) return Swal.fire("國庫空虛", "沒錢充公", "error");
            db.total -= amt;
            mData.saved += amt;
            mData.savedDetails.push({amt: amt, date: new Date().toLocaleDateString()});
        } else if(type === 'out') {
            const { value: cat } = await Swal.fire({
                title: '選擇名目',
                input: 'select',
                inputOptions: db.categories.reduce((a,v)=>{a[v]=v;return a;},{}),
                showCancelButton: true
            });
            if(!cat) return;
            db.total -= amt;
            mData.out += amt;
            mData.outDetails[cat] = (mData.outDetails[cat] || 0) + amt;
        }
        amtInput.value = '';
        document.getElementById('quote-display').innerText = roasts[Math.floor(Math.random()*roasts.length)];
        syncData('push');
    }

    async function openSettingsMenu() {
        const { value: mode } = await Swal.fire({
            title: '⚙️ 戶部設定',
            input: 'radio',
            inputOptions: { 'URL': '基地網址設定', 'CAT': '噴錢名目管理' },
            inputValidator: (v) => !v && '請選擇一個功能',
            showCancelButton: true,
            confirmButtonText: '進入'
        });

        if (mode === 'URL') {
            const { value: u } = await Swal.fire({ title: '基地網址', input: 'text', inputValue: WEB_APP_URL });
            if (u !== null) { WEB_APP_URL = u; localStorage.setItem('user_gas_url', u); syncData('pull'); }
        } else if (mode === 'CAT') {
            manageCategories();
        }
    }

    async function manageCategories() {
        let catHtml = db.categories.map((c, i) => `
            <div class="swal-list-item">
                <span>${c}</span>
                <button onclick="window.removeCat(${i})" style="background:#ff4757; color:white; border:none; border-radius:5px; padding:5px 10px;">刪除</button>
            </div>
        `).join('');

        const { value: action } = await Swal.fire({
            title: '名目官制表',
            html: `<div style="text-align:left;">${catHtml}</div>`,
            showCancelButton: true,
            confirmButtonText: '➕ 新增名目',
            cancelButtonText: '完成退出'
        });

        if (action) {
            const { value: newName } = await Swal.fire({ title: '新名目名稱', input: 'text' });
            if (newName) {
                if (!db.categories.includes(newName)) {
                    db.categories.push(newName);
                    syncData('push');
                    manageCategories(); // 重新整理
                }
            }
        }
    }

    // 將刪除功能掛載到 window，讓 Swal 的 HTML 內容可以呼叫
    window.removeCat = async (index) => {
        const name = db.categories[index];
        const res = await Swal.fire({ title: `刪除「${name}」？`, text: "已記在帳上的金額不會消失，但未來選單將不再出現此項。", showCancelButton: true });
        if(res.isConfirmed) {
            db.categories.splice(index, 1);
            syncData('push');
            manageCategories(); // 重新整理清單
        }
    };

    async function editOut(cat) {
        const mData = getM();
        const amt = mData.outDetails[cat] || 0;
        const { value: action } = await Swal.fire({
            title: cat, text: `$${amt.toLocaleString()}`,
            showDenyButton: true, showCancelButton: true,
            confirmButtonText: '更換名目', denyButtonText: '刪除紀錄', cancelButtonText: '算了吧'
        });
        if(action) {
            const { value: ncat } = await Swal.fire({ title: '換到哪？', input: 'select', inputOptions: db.categories.reduce((a,v)=>{a[v]=v;return a;},{}) });
            if(ncat) {
                mData.outDetails[ncat] = (mData.outDetails[ncat]||0) + amt;
                delete mData.outDetails[cat];
                syncData('push');
            }
        } else if(action === false) {
            db.total += amt; mData.out -= amt; delete mData.outDetails[cat];
            syncData('push');
        }
    }

    function updateUI() {
        const mData = getM();
        document.getElementById('balance-display').innerText = '$ ' + (db.total || 0).toLocaleString();
        document.getElementById('stats-grid').innerHTML = `
            <div class="stat-card"><span class="stat-label">俸祿</span><span class="stat-val" style="color:var(--salary)">$${mData.salary.toLocaleString()}</span></div>
            <div class="stat-card"><span class="stat-label">充公</span><span class="stat-val" style="color:var(--in)">$${mData.saved.toLocaleString()}</span></div>
            <div class="stat-card"><span class="stat-label">支出</span><span class="stat-val" style="color:var(--out)">$${mData.out.toLocaleString()}</span></div>
            <div class="stat-card"><span class="stat-label">進度</span><span class="stat-val" style="color:var(--gold)">${Math.min(100,((mData.saved/db.monthlyGoal)*100)).toFixed(0)}%</span></div>
        `;
        const exList = document.getElementById('expense-list'); exList.innerHTML = '';
        const details = mData.outDetails || {};
        for(let c in details) {
            const d = document.createElement('div'); d.className='detail-item'; d.onclick=()=>editOut(c);
            d.innerHTML = `<span>${c}</span><span style="color:var(--out)">$${details[c].toLocaleString()} ⚙️</span>`;
            exList.appendChild(d);
        }
        const svList = document.getElementById('saved-list'); svList.innerHTML = '';
        (mData.savedDetails || []).forEach((v, i)=>{
            const d = document.createElement('div'); d.className='detail-item'; d.onclick=()=>delIn(i);
            d.innerHTML = `<span>${v.date}</span><span style="color:var(--in)">$${v.amt.toLocaleString()} 🗑️</span>`;
            svList.appendChild(d);
        });
        if(document.getElementById('page-stats').classList.contains('active')) {
            const ctx = document.getElementById('outPieChart');
            if(outPieChart) outPieChart.destroy();
            const labs = Object.keys(details);
            outPieChart = new Chart(ctx, {
                type:'doughnut',
                data: { labels: labs.length?labs:["無"], datasets:[{data: labs.length?Object.values(details):[1], backgroundColor:['#ff4757','#ffa502','#2ed573','#4b7bec','#a55eea','#1abc9c','#34495e','#95afc0','#f0932b']}] },
                options: { plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } } }
            });
        }
    }

    async function syncData(mode) {
        if(!WEB_APP_URL) return updateUI();
        document.getElementById('loading').style.display='flex';
        try {
            if(mode==='push') await fetch(WEB_APP_URL, {method:'POST', body:JSON.stringify({data:db})});
            else { 
                const r = await fetch(WEB_APP_URL); 
                const j = await r.json(); 
                if(j && typeof j.total === 'number') {
                    db = j;
                    if(!db.categories) db.categories = ["伙食", "交通", "娛樂", "購物", "其他"];
                }
            }
            updateUI();
        } catch(e) { console.error(e); }
        document.getElementById('loading').style.display='none';
    }

    async function delIn(idx) {
        const mData = getM();
        const item = mData.savedDetails[idx];
        const res = await Swal.fire({ title: '撤銷充公？', text: `$${item.amt}`, showCancelButton: true });
        if(res.isConfirmed) {
            db.total += item.amt; mData.saved -= item.amt;
            mData.savedDetails.splice(idx, 1);
            syncData('push');
        }
    }

    function switchPage(p) { document.querySelectorAll('.page').forEach(x=>x.classList.remove('active')); document.getElementById(p).classList.add('active'); updateUI(); }
    
    window.onload = () => syncData('pull');
</script>
</body>
</html>
