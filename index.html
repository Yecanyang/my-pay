<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戶部尚書：國庫分析版</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="戶部尚書">
    <link rel="apple-touch-icon" href="image.png"> 
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #f0f2f5; --out: #ff4757; --in: #2ed573; --gold: #ffa502; --silver: #576574; --salary: #a55eea; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; position: relative; }
        .settings-icon { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; cursor: pointer; z-index: 999; padding: 5px; opacity: 0.6; }
        .page { display: none; }
        .page.active { display: block; }
        .balance-box { background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #eee; }
        .balance-amount { font-size: 2.2rem; font-weight: bold; color: var(--silver); }
        .weekly-stats { display: flex; justify-content: space-around; font-size: 0.85rem; color: #666; margin-top: 10px; }
        .stat-item span { display: block; font-weight: bold; font-size: 1.1rem; margin-top: 3px; }
        .btn-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .btn { border: none; padding: 14px; border-radius: 15px; font-weight: bold; color: white; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-salary { background: var(--salary); grid-column: span 2; margin-bottom: 5px; }
        .btn-out { background: var(--out); }
        .btn-in { background: var(--in); }
        .btn-chart { background: #4b7bec; grid-column: span 2; margin-top: 5px; }
        .btn-challenge { background: var(--gold); grid-column: span 2; margin-top: 5px; }
        .grid-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 15px; max-height: 350px; overflow-y: auto; padding: 8px; border: 1px solid #eee; border-radius: 15px; background: #fafafa; }
        .grid-item { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #fff; border: 1px solid #ddd; border-radius: 10px; font-size: 0.85rem; cursor: pointer; transition: 0.3s; }
        .grid-item.done { background: var(--in); color: white; border-color: var(--in); font-weight: bold; }
        #roast-msg { margin-top: 15px; font-size: 0.9rem; color: #444; min-height: 3.5em; display: flex; align-items: center; justify-content: center; background: #fffbe6; border-radius: 12px; padding: 12px; line-height: 1.4; border: 1px solid #ffe58f; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; align-items: center; justify-content: center; z-index: 10000; }
        canvas { max-width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">⌛ 正在核對帳目...</div>

<div class="card">
    <div class="settings-icon" onclick="openSettings()">⚙️</div>

    <div id="page-home" class="page active">
        <div class="balance-box">
            <div style="font-size: 0.85rem; color: #888;">國庫白銀總量</div>
            <div class="balance-amount" id="balance-display">$ 0</div>
            <div class="weekly-stats">
                <div class="stat-item">累計充公<span id="weekly-in" style="color:var(--in)">$ 0</span></div>
                <div class="stat-item">累計噴錢<span id="weekly-out" style="color:var(--out)">$ 0</span></div>
            </div>
        </div>
        <input type="number" id="amount" placeholder="白銀數額..." inputmode="numeric" style="width:100%; padding:15px; border-radius:15px; border:2px solid #eee; box-sizing:border-box; margin-bottom:10px; font-size:1.3rem; text-align:center; outline:none;">
        <div class="btn-container">
            <button class="btn btn-salary" onclick="updateMoney('salary')">🧧 領取俸祿</button>
            <button class="btn btn-out" onclick="updateMoney('out')">💸 肆意噴錢</button>
            <button class="btn btn-in" onclick="updateMoney('in')">📜 強制充公</button>
            <button class="btn btn-chart" onclick="switchPage('page-stats')">📊 揮霍程度分析</button>
            <button class="btn btn-challenge" onclick="switchPage('page-365')">🏆 365天白銀挑戰</button>
        </div>
        <div id="roast-msg">尚書大人，請先設定基地網址。</div>
    </div>

    <div id="page-stats" class="page">
        <h3>📊 國庫揮霍程度報告</h3>
        <div style="font-size: 0.9rem; color: #666; margin-bottom: 10px;">
            本月評價：<span id="spending-rank" style="font-weight: bold; color: var(--out);">尚未結算</span>
        </div>
        <canvas id="myChart"></canvas>
        <div style="margin-top: 20px; font-size: 0.85rem; text-align: left; background: #f9f9f9; padding: 10px; border-radius: 10px;">
            * 統計邏輯：以「領取俸祿」為基準，計算「噴錢」佔比。充公則視為國庫建設，不計入揮霍。
        </div>
        <button class="btn" style="background:#bbb; width:100%; margin-top:15px;" onclick="switchPage('page-home')">回宮</button>
    </div>

    <div id="page-365" class="page">
        <h3 style="margin-bottom: 5px;">🏆 365天白銀挑戰</h3>
        <div class="grid-container" id="challenge-grid"></div>
        <button class="btn" style="background:#bbb; width:100%; margin-top:15px;" onclick="switchPage('page-home')">回宮</button>
    </div>
</div>

<script>
    const roasts = [
        "尚書大人，這筆白銀充公後，國庫終於有點樣字了。",
        "領俸祿了！別剛領完就去揮霍，微臣看著呢。",
        "今日噴錢如流水，尚書大人是想去當乞丐嗎？",
        "白銀入庫，國泰民安；肆意噴錢，抄家滅門！",
        "警告：國庫水位過低，請立即強制充公！",
        "充公成功！雖然不多，但勉強算你還有良心。"
    ];

    let WEB_APP_URL = localStorage.getItem('user_gas_url') || "";
    let db = { total: 0, wIn: 0, wOut: 0, salary: 0, doneDays: [] };
    let myChart = null;

    async function openSettings() {
        const { value: url } = await Swal.fire({
            title: '基地設定',
            input: 'text',
            inputValue: WEB_APP_URL,
            showCancelButton: true,
            confirmButtonText: '儲存'
        });
        if (url) {
            localStorage.setItem('user_gas_url', url);
            WEB_APP_URL = url;
            syncData('pull');
        }
    }

    async function syncData(type) {
        if (!WEB_APP_URL) return;
        document.getElementById('loading').style.display = 'flex';
        try {
            if (type === 'push') {
                await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ data: db }) });
            } else {
                const res = await fetch(WEB_APP_URL);
                db = await res.json();
                if (!db.salary) db.salary = 0; // 相容舊版本
            }
            updateUI();
        } catch (e) { console.error(e); }
        document.getElementById('loading').style.display = 'none';
    }

    function updateMoney(type) {
        const amtInput = document.getElementById('amount');
        const amt = parseInt(amtInput.value);
        if (isNaN(amt) || amt <= 0) return;

        if (type === 'salary') {
            db.total += amt;
            db.salary += amt; // 紀錄總俸祿
        } else if (type === 'out') {
            db.total -= amt;
            db.wOut += amt; // 紀錄噴錢
        } else {
            db.total += amt;
            db.wIn += amt; // 一般充公
        }
        amtInput.value = '';
        syncData('push');
    }

    function updateUI() {
        document.getElementById('balance-display').innerText = '$ ' + (db.total || 0).toLocaleString();
        document.getElementById('weekly-in').innerText = '$ ' + (db.wIn || 0).toLocaleString();
        document.getElementById('weekly-out').innerText = '$ ' + (db.wOut || 0).toLocaleString();
        const randomRoast = roasts[Math.floor(Math.random() * roasts.length)];
        document.getElementById('roast-msg').innerText = randomRoast;
        if (document.getElementById('page-stats').classList.contains('active')) updateChart();
    }

    function switchPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id === 'page-stats') updateChart();
        if (id === 'page-365') renderGrid();
    }

    function updateChart() {
        const ctx = document.getElementById('myChart').getContext('2d');
        const spending = db.wOut;
        const savings = Math.max(0, db.salary - db.wOut);
        const ratio = db.salary > 0 ? (spending / db.salary * 100).toFixed(1) : 0;
        
        let rank = "尚無俸祿紀錄";
        if (db.salary > 0) {
            if (ratio < 20) rank = "國之棟樑 (極度節儉)";
            else if (ratio < 50) rank = "清廉正直 (正常開銷)";
            else if (ratio < 80) rank = "奢靡成風 (注意噴錢)";
            else rank = "昏庸無道 (準備抄家)";
        }
        document.getElementById('spending-rank').innerText = rank + ` (${ratio}%)`;

        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['剩下的白銀', '噴掉的錢'],
                datasets: [{
                    data: [savings, spending],
                    backgroundColor: ['#2ed573', '#ff4757']
                }]
            },
            options: { responsive: true }
        });
    }

    function renderGrid() {
        const grid = document.getElementById('challenge-grid');
        grid.innerHTML = '';
        for (let i = 1; i <= 365; i++) {
            const isDone = db.doneDays.includes(i);
            const div = document.createElement('div');
            div.className = 'grid-item' + (isDone ? ' done' : '');
            div.innerText = i;
            div.onclick = async () => {
                if (isDone) {
                    db.doneDays = db.doneDays.filter(day => day !== i);
                    db.total -= i; db.wIn -= i;
                } else {
                    db.doneDays.push(i);
                    db.total += i; db.wIn += i;
                }
                syncData('push');
                renderGrid();
            };
            grid.appendChild(div);
        }
    }

    window.onload = () => { if (WEB_APP_URL) syncData('pull'); };
</script>
</body>
</html>
